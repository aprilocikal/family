<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>For My Beloved Parents 💙</title>
  <meta name="description" content="A heartfelt website dedicated to the most amazing parents. With love, appreciation, and endless gratitude." />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💙</text></svg>" />

  <meta name="apple-mobile-web-app-capable" content="yes" />

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => console.log('PWA ServiceWorker registered successfully:', reg))
          .catch(err => console.log('PWA ServiceWorker registration failed:', err));
      });
    }
  </script>
